<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 01</title>
</head>
<body>
    <script>
        let entrada = prompt("Digite um número inteiro:");
        let numero = Number(entrada);

        if(numero%2 === 0){
            alert(numero + " é par");
        } else {
            alert(numero + " é ímpar");
        }
    </script>
</body>
</html>
