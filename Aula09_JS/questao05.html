<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 05</title>
</head>
<body>
    <script>
        let entrada = prompt("Digite o valor da compra:");
        let valor = Number(entrada); 

        if(valor > 500){
            alert((valor - 0.10*valor) + " R$");
        } else {
            alert(valor + " R$");
        }
    </script>
</body>
</html>
