<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 03</title>
</head>
<body>
    <script>
        var usuario = "usuario01";
        var senha = "123ABC";

        let usuarioRecebido = prompt("Digite o usuário:");
        let senhaRecebida = prompt("Digite a senha:");

        if(usuarioRecebido === usuario && senhaRecebida === senha){
            alert("Acesso permitido!");
        } else {
            alert("Acesso negado!");
        }
    </script>
</body>
</html>
