<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 04</title>
</head>
<body>
    <script>
        let entrada = prompt("Digite a temperatura em Celsius:");
        let temperatura = Number(entrada); 

        if(temperatura < 17){
            alert("Está frio");
        } else if(temperatura > 26){
            alert("Está quente");
        } else {
            alert("Temperatura agradável");
        }
    </script>
</body>
</html>
