<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Evento Esportivo - IFCE</title>
</head>
<body class="bg-dark d-flex justify-content-center align-items-center min-vh-100 py-5">

    <div class="card shadow p-4" style="width: 600px;">
        <form action="formulario inscricao" method="get">

            <div class="mb-3">
                <label for="nome" class="form-label">Nome: </label>
                <input type="text" class="form-control" id="nome" name="nome">
            </div>

            <div class="mb-3">
                <label for="matricula" class="form-label">Matricula: </label>
                <input type="text" class="form-control" id="matricula" name="matricula">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>

            <div class="mb-3">
                <label for="curso" class="form-label">Curso: </label>
                <input type="text" class="form-control" id="curso" name="curso">
            </div>

            <div class="mb-3">
                <label for="campus" class="form-label">Campus: </label>
                <input type="text" class="form-control" id="campus" name="campus">
            </div>

            <div class="mb-3">
                <label class="form-label">Modalidade:</label>
                <select class="form-select" name="modalidade">
                    <option value="futsal">Futsal</option>
                    <option value="volei">Vôlei</option>
                    <option value="corrida">Corrida</option>
                    <option value="xadrez">Xadrez</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Turno:</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="manha">
                    <label class="form-check-label">Manhã</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="tarde">
                    <label class="form-check-label">Tarde</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="noite">
                    <label class="form-check-label">Noite</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="integral" checked>
                    <label class="form-check-label">Integral</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Sexo:</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="sexo" value="masculino">
                    <label class="form-check-label">Masculino</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="sexo" value="feminino">
                    <label class="form-check-label">Feminino</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Data de Nascimento:</label>
                <input type="date" class="form-control" name="dataNascimento">
            </div>

            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="tel" class="form-control" id="telefone" name="telefone">
            </div>

            <div class="mb-3">
                <label for="observacoes" class="form-label">Observações</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="4" placeholder="Observações"></textarea>
            </div>

            <div class="mb-3 form-check">
                <label class="form-check-label" for="confirmar">Confirmo a leitura do regulamento </label>
                <input class="form-check-input" type="checkbox" id="confirmar" name="confirmar">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Enviar</button>
            </div>
        </form>
    </div>
</body>
</html>
