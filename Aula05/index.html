<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Evento Esportivo - IFCE</title>
</head>
<body>
    <div class="formContainer">
        <form action="formulario inscricao" method="get">
            <div>
                <label for="nome">Nome: </label>
                <input type="text" id="nome" name="nome">
            </div>
            <div>
                <label for="matricula">Matricula: </label>
                <input type="text" id="matricula" name="matricula" required>
            </div>
            <div>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email">
            </div>
            <div>
                <label for="curso">Curso: </label>
                <input type="text" id="curso" name="curso">
            </div>
            <div>
                <label for="campus">Campus: </label>
                <input type="text" id="campus" name="campus">
            </div>
            <div>
                <label for="modalidade">Modalidade: </label>
                <select id="modalidade" name="modalidade">
                    <option value="futsal">Futsal</option>
                    <option value="volei">Vôlei</option>
                    <option value="corrida">Corrida</option>
                    <option value="xadrez">Xadrez</option>
                </select>
            </div>
            <div class="turno">
                <p>Turno</p>
                <input type="radio" id="manha" name="turno" value="manha">
                <label for="manha">Manhã</label>
                <input type="radio" id="tarde" name="turno" value="tarde">
                <label for="tarde">Tarde</label>
                <input type="radio" id="noite" name="turno" value="noite">
                <label for="noite">Noite</label>
                <input type="radio" id="integral" name="turno" value="integral" checked>
                <label for="integral">Integral</label>
            </div> 
            <div class="sex">
                <p>Sexo</p>
                <input type="radio" id="masculino" name="sexo" value="masculino">
                <label for="masculino">Masculino</label>
                <input type="radio" id="feminino" name="sexo" value="feminino">
                <label for="feminino">Feminino</label>
            </div>
            <div>
                <label for="dataNascimento">Data de Nascimento: </label>
                <input type="date" id="dataNascimento" name="dataNascimento">
            </div>
            <div>
                <label for="telefone">Telefone: </label>
                <input type="tel" id="telefone" name="telefone">
            </div>
            <div>
                <label for="observacoes">Observações: </label><br>
                <textarea id="observacoes" name="observacoes" rows="5" cols="40" placeholder="Observações"></textarea>
            </div>
            <div>
                <label for="confirmar">Confirmo a leitura do regulamento: </label>
                <input type="checkbox" id="confirmar" name="confirmar">
            </div>
            <div class="button">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </div>
</body>
</html>
